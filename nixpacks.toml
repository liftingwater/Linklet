# Nixpacks configuration for Sevalla deployment
# Specifies the Deno version and startup configuration

[phases.setup]
nixPkgs = ["unzip"]

[phases.install]
cmds = [
  "curl -fsSL https://deno.land/install.sh | sh",
  "$HOME/.deno/bin/deno cache src/main.ts"
]

[start]
cmd = "export PATH=$HOME/.deno/bin:$PATH && $HOME/.deno/bin/deno serve -A --unstable-kv --unstable-net src/main.ts"
